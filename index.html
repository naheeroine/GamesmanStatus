<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GamesmanStatus</title>
  <style>
    :root { --ok:#16a34a; --warn:#d97706; --fail:#dc2626; --fg:#0f172a; --muted:#475569; --bg:#f8fafc; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 16px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; color: var(--fg); background: var(--bg); }
    header { padding: 24px; border-bottom: 1px solid #e2e8f0; background: white; }
    header h1 { margin: 0 0 6px; font-size: 22px; }
    header p { margin: 0; color: var(--muted); }
    main { max-width: 900px; margin: 0 auto; padding: 24px; }
    .banner { margin: 16px 24px; padding: 12px 14px; border-radius: 10px; background: #eef2ff; color:#1e3a8a; display:flex; align-items:center; gap:8px; }
    .row { display:flex; align-items:center; justify-content:space-between; background:white; border:1px solid #e2e8f0; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
    .left { display:flex; align-items:center; gap:10px; }
    .name { font-weight:600; }
    .meta { color: var(--muted); font-size:14px; }
    .dot { width:12px; height:12px; border-radius:50%; }
    .ok { background: var(--ok); }
    .warn { background: var(--warn); }
    .fail { background: var(--fail); }
    footer { text-align:center; color: var(--muted); padding: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>GamesmanStatus</h1>
    <p>Live status of GamesCrafters website and APIs</p>
  </header>

  <div id="banner" class="banner">Loading status…</div>
  <main id="list"></main>

  <footer>
    <small>Config-driven MVP · Phase 1</small>
  </footer>

  <script>
    const toBadge = s => s === 'operational' ? 'ok' : (s === 'degraded' ? 'warn' : 'fail');

    async function load() {
      try {
        const res = await fetch('data/status.json', { cache: 'no-store' });
        const data = await res.json();

        // banner
        document.getElementById('banner').textContent = data.summary || 'All systems operational';

        // rows
        const list = document.getElementById('list');
        list.innerHTML = '';
        (data.components || []).forEach(c => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div class="left">
              <span class="dot ${toBadge(c.state)}"></span>
              <span class="name">${c.name || 'Component'}</span>
            </div>
            <div class="meta">
              ${c.state || 'unknown'} · ${typeof c.latency_ms==='number' ? c.latency_ms+' ms' : ''} · last checked ${c.last_checked || ''}
            </div>`;
          list.appendChild(row);
        });

      } catch (e) {
        document.getElementById('banner').textContent = 'Could not load status.json';
      }
    }
    load();
  </script>
</body>
</html>
