name: GamesmanStatus checks (every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"     # UTC
  workflow_dispatch:

concurrency:
  group: status-cron
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: pip install -r requirements.txt

      # See what triggered the run
      # - name: Debug event
      #   run: echo "Event=${{ github.event_name }} @ ${{ github.run_started_at }}"

      - name: Run probes
        run: python scripts/run_checks.py

      - name: Commit updated status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git commit -m "update status.json [skip ci]" || echo "no changes"
          git pull --rebase origin $GITHUB_REF_NAME || true
          git push || true
