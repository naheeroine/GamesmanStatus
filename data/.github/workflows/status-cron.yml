name: GamesmanStatus checks (every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes (UTC)
  workflow_dispatch:        # allows manual run from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data/status.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run probes
        run: python scripts/run_checks.py

      - name: Commit updated status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git commit -m "chore(data): update status.json [skip ci]" || echo "no changes"
          git push
